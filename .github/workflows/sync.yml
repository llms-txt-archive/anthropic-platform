name: Sync Claude Platform Docs Archive

on:
  workflow_dispatch:
  schedule:
    - cron: "42 * * * *"

permissions:
  contents: write

jobs:
  sync:
    uses: f-pisani/llmstxt/.github/workflows/archive-sync.yml@main
    with:
      source_url: https://platform.claude.com/llms.txt
      site_name: Claude Platform Docs
      site_url: https://platform.claude.com
      repo_title: Claude Platform Docs Archive
      schedule_label: Hourly at :42 UTC
      tool_ref: main
    secrets: inherit
